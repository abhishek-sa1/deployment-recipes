- name: 'Cleanup ochami'
  hosts: ochami
  tasks:
    - name: Copy cleanup to root
      ansible.builtin.copy:
        src: cleanup.sh
        dest: /root/cleanup.sh

    - name: Run cleanup
      ansible.builtin.shell:
        command: chmod +x /root/cleanup.sh && bash /root/cleanup.sh
      changed_when: false
      register: cleanup
    
    - name: Cleanup output
      ansible.builtin.debug:
        msg: "{{ cleanup.stdout_lines }}"
